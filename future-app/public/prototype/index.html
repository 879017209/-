<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>西部创源 - 工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <defs>
            <linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#bc3ba9" />
              <stop offset="1" stop-color="#4e55cf" />
            </linearGradient>
          </defs>
          <circle cx="16" cy="16" r="13" fill="url(#logoGradient)" />
          <path d="M7 16a9 9 0 0 1 17.2-3.7L16 14l-4.7 7.5A8.9 8.9 0 0 1 7 16Z" fill="#23252a" />
          <path d="M16 14 24.2 12.3A9 9 0 0 1 12 24.1l-.7-2.6Z" fill="#87389a" />
        </svg>
        <div class="brand-copy">
          <strong>西 部 创 源</strong>
          <span>WEST GENESIS</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-button" aria-label="帮助">
          <svg viewBox="0 0 24 24"><path d="M4 5.5h6.2c1.3 0 2.3.5 2.8 1.2.5-.7 1.5-1.2 2.8-1.2H20v12h-4.2c-1.5 0-2.4.5-2.8 1.2-.4-.7-1.3-1.2-2.8-1.2H4v-12Zm9 1.2v12m-6-9.4h3.5m-3.5 3h3.5m5-3H18m-2.5 3H18" /></svg>
        </button>
        <button class="user-button" aria-label="用户菜单">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" /><circle cx="12" cy="9" r="2.7" fill="#1d1f22" stroke="none" /><path d="M7.3 17.3c.7-2.1 2.3-3.2 4.7-3.2s4 1.1 4.7 3.2" fill="#1d1f22" stroke="none" /></svg>
          <span>王朋</span>
        </button>
      </div>
    </header>

    <aside class="sidebar">
      <nav>
        <button class="nav-item active" data-nav="工作台">
          <svg viewBox="0 0 24 24"><path d="m4 11 8-7 8 7M6 9.5V20h12V9.5M10 20v-6h4v6" /></svg>
          <span>工作台</span>
        </button>
        <button class="nav-item" data-nav="项目管理">
          <svg viewBox="0 0 24 24"><path d="M6 4h12v16H6zM8.5 8h7M8.5 11.5h7M8.5 15h5" /></svg>
          <span>项目管理</span>
        </button>
        <button class="nav-item expandable" data-nav="模型管理">
          <svg viewBox="0 0 24 24"><path d="m12 3 8 4-8 4-8-4 8-4Zm-8 4v9l8 5 8-5V7m-8 4v10" /></svg>
          <span>模型管理</span>
          <svg class="nav-arrow" viewBox="0 0 24 24"><path d="m8 10 4 4 4-4" /></svg>
        </button>
        <div class="subnav">
          <button>模型列表</button>
          <button>模型版本</button>
        </div>
        <button class="nav-item" data-nav="标签管理">
          <svg viewBox="0 0 24 24"><path d="M4 13.5 13.5 4H19l2 2v5.5L11.5 21 4 13.5Z" /><circle cx="16.5" cy="7.5" r="1" /></svg>
          <span>标签管理</span>
        </button>
        <button class="nav-item expandable" data-nav="空间管理">
          <svg viewBox="0 0 24 24"><path d="M8 9.5c0 1.4 1.3 2.5 3 2.5s3-1.1 3-2.5S12.7 7 11 7 8 8.1 8 9.5Zm-4 7.3c.5-2.2 2.5-3.6 5.3-3.6h3.4c2.8 0 4.8 1.4 5.3 3.6M17 7h3v3m0-3-3.5 3.5" /></svg>
          <span>空间管理</span>
          <svg class="nav-arrow" viewBox="0 0 24 24"><path d="m8 10 4 4 4-4" /></svg>
        </button>
        <div class="subnav">
          <button>空间列表</button>
          <button>成员管理</button>
        </div>
      </nav>
    </aside>

    <main class="workspace">
      <section class="dashboard-shell">
        <div class="project-banner panel">
          <div>
            <div class="project-title">清华路端项目&nbsp; 第一批次 <button class="switch-icon" aria-label="切换项目">
              <svg viewBox="0 0 18 18" aria-hidden="true">
                <path d="M3 5.5h10.5m-2.8-2.8 2.8 2.8-2.8 2.8M15 12.5H4.5m2.8 2.8-2.8-2.8 2.8-2.8" />
              </svg>
            </button></div>
            <div class="project-status">尚未领取任务</div>
          </div>
          <button class="primary-btn" id="bannerClaim">随机领取</button>
        </div>

        <div class="dashboard-grid">
          <section class="task-panel panel">
            <div class="task-heading">
              <strong>我的任务</strong>
              <div class="tabs" role="tablist">
                <button class="tab active" data-tab="todo">待处理</button>
                <button class="tab" data-tab="paused">已暂停</button>
                <button class="tab" data-tab="submitted">已提交</button>
              </div>
            </div>
            <form class="filters" id="filterForm">
              <label>
                <span>任务名称：</span>
                <input id="taskName" placeholder="请输入任务名称" />
              </label>
              <label>
                <span>当前节点：</span>
                <select id="nodeFilter">
                  <option value="">请选择节点</option>
                  <option value="标注">标注</option>
                  <option value="审核">审核</option>
                  <option value="质检">质检</option>
                  <option value="验收">验收</option>
                </select>
              </label>
              <label>
                <span>作业类型：</span>
                <select id="workFilter">
                  <option value="">请选择作业类型</option>
                  <option value="正常">正常</option>
                  <option value="驳回">驳回</option>
                </select>
              </label>
              <button class="primary-btn query-btn" type="submit">查询</button>
              <button class="secondary-btn" id="resetBtn" type="button">重置</button>
              <button class="advanced-btn" id="advancedBtn" type="button">高级筛选</button>
            </form>
            <div class="advanced-filter" id="advancedFilter">
              <label>标注类型：
                <select id="labelFilter">
                  <option value="">全部类型</option>
                  <option value="障碍物目标检测">障碍物目标检测</option>
                  <option value="车道线">车道线</option>
                  <option value="语义分割">语义分割</option>
                </select>
              </label>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>任务名称</th>
                    <th>当前节点</th>
                    <th>作业类型</th>
                    <th>标注类型</th>
                    <th>帧数</th>
                    <th>对象数</th>
                    <th>开始时间</th>
                    <th>最后更新时间</th>
                    <th>处理时长</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="taskRows"></tbody>
              </table>
              <div class="empty-state" id="emptyState">暂无匹配任务</div>
            </div>
            <div class="table-footer">
              <span id="totalCount">共 4 条</span>
              <div class="pagination">
                <button class="page-btn">‹</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">4</button>
                <button class="page-btn">5</button>
                <button class="page-btn">…</button>
                <button class="page-btn">50</button>
                <button class="page-btn">›</button>
                <button class="size-btn">10条/页⌄</button>
              </div>
            </div>
          </section>

          <aside class="right-column">
            <section class="target-card panel">
              <strong>今日标注量</strong>
              <div><span class="target-number">3008</span><span class="target-unit">个对象</span></div>
            </section>
            <section class="pool panel">
              <div class="pool-heading">
                <strong>任务池 <small>共200条</small></strong>
                <button class="advanced-btn" id="poolFilterBtn">高级筛选</button>
              </div>
              <div class="pool-filter" id="poolFilter">
                <button data-filter="all" class="active">全部</button>
                <button data-filter="available">可领取</button>
              </div>
              <div class="pool-list" id="poolList"></div>
            </section>
          </aside>
        </div>
      </section>
    </main>

    <button class="edge-handle" id="edgeHandle" aria-label="收起任务池">›</button>
    <div class="toast" id="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
